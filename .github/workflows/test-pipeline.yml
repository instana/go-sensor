# This is a test pipeline

name: Test Pipeline

on:
  workflow_dispatch:
  pull_request:
   branches:
   - test-workflow
   types: [closed]

jobs:
  release_instrumentations:
    name: Test Pipeline
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
      name: Checkout repo
      with:
        fetch-depth: 0
        ssh-key: ${{secrets.PRIVATE_KEY_GO_TRACER_RELEASE_LATEST}}
        ref: test-workflow
    - name: Test run
      id: test-run
      run: |
        
        # Commit and push test
        ls -la >> 1.txt
        git remote set-url --push origin https://$GIT_COMMITTER_NAME:$GITHUB_TOKEN@github.com/instana/go-sensor
        git add 1.txt
        git commit -m "chore: test commit to verify a pipeline"
        git push origin test-workflow

      shell: bash {0}
      env:
        GH_TOKEN: ${{ github.token }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GIT_AUTHOR_NAME: ${{ github.event.pull_request.merged_by.login }}
        GIT_AUTHOR_EMAIL: ${{ github.event.pull_request.merged_by.login }}@users.noreply.github.com
        GIT_COMMITTER_NAME: ${{ github.event.pull_request.merged_by.login }}
        GIT_COMMITTER_EMAIL: ${{ github.event.pull_request.merged_by.login }}@users.noreply.github.com  
