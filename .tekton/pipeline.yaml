      #         - name: excludeDirs
      #           value: "./example/grpc-client-server ./instrumentation/cloud.google.com/go ./instrumentation/instaawsv2 ./instrumentation/instaamqp ./instrumentation/instaawssdk ./instrumentation/instagocb ./example/couchbase"
      #     - name: build-119
      #       params:
      #         - name: imageTag
      #           value: "1.19"
      #         - name: excludeDirs
      #           value: ""
      #     - name: build-120
      #       params:
      #         - name: imageTag
      #           value: "1.20"
      #         - name: excludeDirs
      #           value: ""
      #     - name: build-121
      #       params:
      #         - name: imageTag
      #           value: "1.21"
      #         - name: excludeDirs
      #           value: ""

      taskRef:
        name: go-tracer-integration-task
      workspaces:
        - name: task-pvc
          workspace: go-tracer-ci-pipeline-pvc

    - name: integrationtestcouchbase
      runAfter:
        - integrationtestcommon
      params:
      - name: imageTag
        value: $(params.go-version)
      - name: excludeDirs
        value: ""
      # matrix:
      #   params:
      #     - name: imageTag
      #       value:
      #         - "1.19"

      taskRef:
        name: go-tracer-integration-couchbase-task
      workspaces:
        - name: task-pvc
          workspace: go-tracer-ci-pipeline-pvc

  finally:
    - name: github-set-check-status-to-success-or-failure
      taskRef:
        kind: Task
        name: github-set-status
      params:
      - name: SHA
        value: $(params.git-commit-sha)
      - name: STATE
        value: "$(tasks.status)"
      - name: PIPELINE_RUN_NAME
        value: $(context.pipelineRun.name)
      - name: go-version
        value: $(params.go-version)